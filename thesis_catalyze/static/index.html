<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>RasPi Proxy UI</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Raspberry Pi API Proxy</h1>

    <label>Path on Raspberry Pi (e.g. /status)</label>
    <input id="path" type="text" value="/" />

    <label>Method</label>
    <select id="method">
      <option>GET</option>
      <option>POST</option>
      <option>PUT</option>
      <option>DELETE</option>
    </select>

    <label>Body (JSON for POST/PUT)</label>
    <textarea id="body" placeholder='{"key": "value"}'></textarea>

    <div class="buttons">
      <button id="send">Send</button>
      <button id="ping">Ping base</button>
    </div>

    <h2>Response</h2>
    <pre id="response">(no response yet)</pre>
  </main>
  <script src="app.js"></script>
</body>
</html>
